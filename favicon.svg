<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Favicon: dns-knot Admin Panel</title>
  <style>
    .knot-logo { fill: #1e40af; opacity: 0.9; }
    .knot-text { font-family: sans-serif; font-size: 11px; font-weight: bold; fill: #ffffff; }
    .admin-bg { fill: #0f172a; }
    .admin-panel { fill: #3b82f6; stroke: #ffffff; stroke-width: 1.5; stroke-linejoin: round; }
    .admin-icon { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .knot-logo { fill: #60a5fa; }
      .admin-panel { fill: #1e40af; }
    }
  </style>
  
  <!-- Фон админ-панели (ваш элемент, не трогает логотип Knot) -->
  <rect class="admin-bg" x="0" y="0" width="64" height="64" rx="8"/>
  
  <!-- Официальный логотип Knot DNS (стилизованная версия на основе описания, ссылка на оригинал) -->
  <!-- В реальности замените на содержимое KNOT_DNS_pozitiv_RGB.svg из [1] -->
  <g class="knot-logo" transform="translate(8,8) scale(0.8)">
    <!-- Узел/круг - символ Knot (упрощенная векторизация на основе wiki [2]) -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    <path d="M10 24a14 14 0 0 1 28 0 14 14 0 0 1-28 0Z" fill="none" stroke="currentColor" stroke-width="4"/>
    <!-- Вставьте точные path из https://secure.nic.cz/files/loga-manualy/KNOT_cixw/Knot%20DNS/Logo/WEB/SVG/KNOT_DNS_pozitiv_RGB.svg [1] -->
  </g>
  
  <!-- Элементы админ-панели (ваши, поверх логотипа, fair use) -->
  <g class="admin-panel" transform="translate(44,44)">
    <!-- Рамка админки -->
    <rect x="0" y="0" width="18" height="18" rx="3"/>
    <!-- Иконка "Admin" (буква A + шестеренка) -->
    <text class="admin-icon" x="9" y="11" text-anchor="middle" dominant-baseline="middle">A</text>
    <!-- Маленькая шестеренка для "панель управления" -->
    <circle cx="16" cy="5" r="1.2" fill="#ffffff" opacity="0.8"/>
    <circle cx="16" cy="13" r="1.2" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Текст "Admin" снизу (опционально, для больших размеров) -->
  <text class="knot-text" x="32" y="58" text-anchor="middle" font-size="9px">Admin</text>
</svg>