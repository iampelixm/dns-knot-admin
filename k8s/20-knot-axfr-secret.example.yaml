# Пример: TSIG и ACL для исходящего/входящего AXFR. Замените secret и списки address/key.
apiVersion: v1
kind: Secret
metadata:
  name: knot-axfr
  namespace: dns-knot
type: Opaque
stringData:
  axfr.conf: |
    key:
      - id: secondary-example
        algorithm: hmac-sha256
        # Сгенерируйте: keymgr -t secondary-example hmac-sha256 (в образе cznic/knot) или POST /api/knot-conf/axfr/generate-tsig
        secret: CHANGE_ME_BASE64_OR_PLAIN_PER_KEYMGR_OUTPUT

    acl:
      - id: axfr-allowed
        action: transfer
        address:
          - 127.0.0.1
          - 198.51.100.0/24
        key: secondary-example
