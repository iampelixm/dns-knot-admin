# Это не манифест для apply — только комментарии.
# Создайте docker-registry secret для imagePullSecrets в Deployment dnsadmin, например:
#
#   kubectl create secret docker-registry registry-credentials \
#     --docker-server=https://registry.example.com \
#     --docker-username=robot \
#     --docker-password=TOKEN \
#     -n dns-knot
#
# Затем в 80-dnsadmin-deployment.example.yaml раскомментируйте:
#   imagePullSecrets:
#     - name: registry-credentials
