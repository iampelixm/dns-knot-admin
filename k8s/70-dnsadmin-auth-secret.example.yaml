# Учётные данные веб-UI dnsadmin и JWT. Сгенерируйте JWT_SECRET: openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: dnsadmin-auth
  namespace: dns-knot
type: Opaque
stringData:
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: CHANGE_ME_STRONG_PASSWORD
  JWT_SECRET: CHANGE_ME_OPENSSL_RAND_HEX_32
