apiVersion: v1
kind: ServiceAccount
metadata:
  name: dnsadmin
  namespace: dns-knot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dnsadmin
  namespace: dns-knot
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["knot-axfr"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dnsadmin
  namespace: dns-knot
subjects:
  - kind: ServiceAccount
    name: dnsadmin
    namespace: dns-knot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dnsadmin
