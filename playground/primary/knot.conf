server:
  listen: 0.0.0.0@53
  identity: ns1.example.test
  nsid: ns1.example.test

log:
  - target: stdout
    any: info

database:
  storage: /var/lib/knot

# TSIG-ключ для авторизации AXFR и NOTIFY.
# ТОЛЬКО ДЛЯ PLAYGROUND — не использовать в продакшене.
key:
  - id: playground-tsig
    algorithm: hmac-sha256
    secret: cGxheWdyb3VuZC10c2lnLWtleS1mb3ItdGVzdGluZy1vbmx5IQ==

remote:
  - id: secondary1
    address: 172.30.0.11@53
    key: playground-tsig
  - id: secondary2
    address: 172.30.0.12@53
    key: playground-tsig

acl:
  - id: axfr-allowed
    action: transfer
    key: playground-tsig

zone:
  - domain: example.test
    file: /zones/example.test.zone
    notify: [secondary1, secondary2]
    acl: [axfr-allowed]

  - domain: playground.local
    file: /zones/playground.local.zone
    notify: [secondary1, secondary2]
    acl: [axfr-allowed]

  - domain: db.test
    file: /zones/db.test.zone
    notify: [secondary1, secondary2]
    acl: [axfr-allowed]
