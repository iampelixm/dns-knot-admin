# Только фронт (Vite). API: локальный uvicorn из backend/ (см. dnsadmin-ui/README.md)
# или kubectl port-forward -n dns-knot svc/dnsadmin 8080:80
services:
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
